<!-- templates/index.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Успеваемость студентов</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1 style="text-align:center;">Успеваемость студентов</h1>

        <a href="{% url 'student_create' %}" class="btn btn-primary" style="margin-bottom:20px;">Добавить студента</a>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>#</th>
                    <th>ФИО</th>
                    {% for subject in subjects %}
                        <th>{{ subject.name }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for statistics in student_statistics %}
                    <tr>
                        <th scope="row">{{ statistics.student.id }}</th>
                        <td>{{ statistics.student.full_name }}</td>
                        {% for score in statistics.scores %}
                            <td>{{ score }}</td>
                        {% endfor %}
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
