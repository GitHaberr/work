<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Удалить предмет</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>Удалить предмет "{{ subject.name }}"?</h1>
        <p>Все оценки по этому предмету также будут удалены.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'index' %}" class="btn btn-default">Отмена</a>
        </form>
    </div>
</body>
</html>
